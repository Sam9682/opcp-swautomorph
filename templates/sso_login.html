<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSO Login - {{ PLTF_NAME }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-title">{{ PLTF_NAME }} SSO</div>
        </div>
    </nav>

    <div class="main-content">
        <div class="auth-container">
            <form class="auth-form" method="POST" action="{{ url_for('sso_authenticate') }}">
                <h2>Single Sign-On Login</h2>
                <p>You are being redirected from an external application. Please login to continue.</p>
                
                {% if error %}
                <div class="error-message" style="color: #e74c3c; margin-bottom: 1rem; text-align: center;">
                    {{ error }}
                </div>
                {% endif %}
                
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                
                <div class="auth-link">
                    <p>Redirecting back to: <strong>{{ redirect_uri }}</strong></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
